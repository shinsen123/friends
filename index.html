function generateCalendar(year, month) {
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const offset = (firstDay + 6) % 7;
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  return cells;
}

function DateSelectScreen({ onNavigate, selectedDates, setSelectedDates }) {
  const [viewMonth, setViewMonth] = useState({ year: 2026, month: 3 });

  const toggleDate = (key) => {
    setSelectedDates(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  const goMonth = (delta) => {
    setViewMonth(prev => {
      let m = prev.month + delta;
      let y = prev.year;
      if (m > 12) { m = 1; y++; }
      if (m < 1) { m = 12; y--; }
      return { year: y, month: m };
    });
  };

  const cells = generateCalendar(viewMonth.year, viewMonth.month);
  const TODAY = { year: 2026, month: 3, day: 28 };

  return (
    <div className="fade-in" style={{ flex:1, overflowY:"auto" }}>
      <Header title="날짜 선택" subtitle="가능한 날짜를 모두 탭해서 선택해주세요" onBack={() => onNavigate(SCREENS.LINK_JOIN)} />
      <div style={{ padding:"0 20px 20px" }}>
        <div style={{ background:"var(--bg-card)", borderRadius:"16px", border:"1px solid var(--border)", padding:"16px", marginBottom:"16px" }}>
          {/* Month nav */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
            <button onClick={() => goMonth(-1)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"22px", color:"var(--text-secondary)", padding:"4px 10px", lineHeight:1 }}>‹</button>
            <span style={{ fontSize:"16px", fontWeight:700, color:"var(--text-primary)" }}>{viewMonth.year}년 {MONTH_NAMES[viewMonth.month-1]}</span>
            <button onClick={() => goMonth(1)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"22px", color:"var(--text-secondary)", padding:"4px 10px", lineHeight:1 }}>›</button>
          </div>
          {/* Day headers */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:"4px", marginBottom:"6px" }}>
            {DAY_LABELS.map((d, i) => (
              <div key={d} style={{ textAlign:"center", fontSize:"11px", fontWeight:700, color: i >= 5 ? "var(--accent)" : "var(--text-tertiary)", padding:"2px" }}>{d}</div>
            ))}
          </div>
          {/* Day cells */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:"4px" }}>
            {cells.map((day, i) => {
              if (!day) return <div key={`empty-${i}`} />;
              const key = `${viewMonth.year}-${viewMonth.month}-${day}`;
              const isSelected = selectedDates.has(key);
              const isToday = viewMonth.year === TODAY.year && viewMonth.month === TODAY.month && day === TODAY.day;
              const colIndex = i % 7;
              const isWeekend = colIndex >= 5;
              const isPast = viewMonth.year < TODAY.year ||
                (viewMonth.year === TODAY.year && viewMonth.month < TODAY.month) ||
                (viewMonth.year === TODAY.year && viewMonth.month === TODAY.month && day < TODAY.day);
              return (
                <button key={key} onClick={() => !isPast && toggleDate(key)} style={{
                  aspectRatio:"1", borderRadius:"10px",
                  border: isToday && !isSelected ? "2px solid var(--accent)" : "none",
                  background: isSelected ? "var(--accent)" : "transparent",
                  color: isSelected ? "#fff" : isPast ? "var(--text-tertiary)" : isWeekend ? "var(--accent)" : "var(--text-primary)",
                  fontSize:"14px", fontWeight: isSelected || isToday ? 700 : 500,
                  cursor: isPast ? "default" : "pointer",
                  opacity: isPast ? 0.35 : 1,
                  display:"flex", alignItems:"center", justifyContent:"center"
                }}>
                  {day}
                </button>
              );
            })}
          </div>
        </div>

        {selectedDates.size > 0 && (
          <div style={{ padding:"12px 14px", background:"rgba(255,107,74,0.08)", borderRadius:"12px", marginBottom:"16px", display:"flex", alignItems:"center", gap:"8px" }}>
            <span style={{ fontSize:"18px" }}>📅</span>
            <span style={{ fontSize:"13px", fontWeight:600, color:"var(--accent)" }}>{selectedDates.size}일 선택됨</span>
          </div>
        )}

        <button onClick={() => { if(selectedDates.size > 0) onNavigate(SCREENS.TIME_SELECT); }} style={{ width:"100%", padding:"16px", background: selectedDates.size > 0 ? "var(--accent)" : "var(--bg-secondary)", color: selectedDates.size > 0 ? "#fff" : "var(--text-tertiary)", border:"none", borderRadius:"14px", fontSize:"16px", fontWeight:700, cursor: selectedDates.size > 0 ? "pointer" : "default", transition:"all 0.2s" }}>
          {selectedDates.size > 0 ? `${selectedDates.size}일 선택 완료 →` : "날짜를 선택해주세요"}
        </button>
      </div>
    </div>
  );
}

function TimeSelectScreen({ onNavigate, selectedDates }) {
  // 내가 선택한 날짜 (홈에서 바로 온 경우 기본값)
  const myDates = selectedDates && selectedDates.size > 0
    ? selectedDates
    : new Set(["2026-3-29", "2026-3-30"]);

  // 모의 다른 참여자 날짜 — union으로 합쳐서 보여줌
  const MOCK_FRIEND_DATES = new Set(["2026-3-30", "2026-4-1", "2026-4-2"]);

  const allDateKeys = [...new Set([...myDates, ...MOCK_FRIEND_DATES])].sort((a, b) => {
    const parse = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
    return parse(a) - parse(b);
  });

  const formatDate = (key) => {
    const [y, m, d] = key.split('-').map(Number);
    const dayNames = ['일','월','화','수','목','금','토'];
    return { label:`${m}/${d}`, dayName: dayNames[new Date(y, m-1, d).getDay()] };
  };

  const [committed, setCommitted] = useState(new Set());
  const [dragRect, setDragRect] = useState(null);
  const dragRectRef = useRef(null);
  const isDragging = useRef(false);
  const dragStartRef = useRef(null);

  const updateRect = (r) => { dragRectRef.current = r; setDragRect(r); };

  const isSelected = (di, ti, key) => {
    const base = committed.has(key);
    const r = dragRect;
    if (!r) return base;
    const inRect = di >= r.minDi && di <= r.maxDi && ti >= r.minTi && ti <= r.maxTi;
    return r.mode === 'add' ? base || inRect : base && !inRect;
  };

  const handlePointerDown = (e, di, ti, key) => {
    e.preventDefault();
    isDragging.current = true;
    const mode = committed.has(key) ? 'remove' : 'add';
    dragStartRef.current = { di, ti, mode };
    updateRect({ minDi:di, maxDi:di, minTi:ti, maxTi:ti, mode });
  };

  const handlePointerMove = (e) => {
    if (!isDragging.current || !dragStartRef.current) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el && el.closest('[data-cell]');
    if (!cell) return;
    const di = parseInt(cell.dataset.di);
    const ti = parseInt(cell.dataset.ti);
    if (isNaN(di) || isNaN(ti)) return;
    const { di: sDi, ti: sTi, mode } = dragStartRef.current;
    updateRect({
      minDi: Math.min(sDi, di), maxDi: Math.max(sDi, di),
      minTi: Math.min(sTi, ti), maxTi: Math.max(sTi, ti),
      mode
    });
  };

  const stopDrag = () => {
    if (!isDragging.current) return;
    isDragging.current = false;
    const r = dragRectRef.current;
    if (r) {
      setCommitted(prev => {
        const next = new Set(prev);
        for (let di = r.minDi; di <= r.maxDi; di++) {
          for (let ti = r.minTi; ti <= r.maxTi; ti++) {
            const key = `${allDateKeys[di]}-${ti}`;
            if (r.mode === 'add') next.add(key); else next.delete(key);
          }
        }
        return next;
      });
    }
    dragRectRef.current = null;
    setDragRect(null);
    dragStartRef.current = null;
  };

  const COL_W = 54;
  const TIME_W = 50;

  return (
    <div className="fade-in" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}
      onPointerMove={handlePointerMove}
      onPointerUp={stopDrag}
      onPointerLeave={stopDrag}
    >
      <Header title="시간 선택" subtitle="드래그해서 가능한 시간을 선택해주세요" onBack={() => onNavigate(SCREENS.DATE_SELECT)} />

      <div style={{ flex:1, overflow:"auto", padding:"0 8px", touchAction:"none", userSelect:"none" }}>
        <div style={{ display:"inline-flex", flexDirection:"column", minWidth:"100%" }}>

          {/* 날짜 헤더 */}
          <div style={{ display:"flex", position:"sticky", top:0, background:"var(--bg-primary)", zIndex:2, paddingBottom:"4px" }}>
            <div style={{ width:`${TIME_W}px`, flexShrink:0 }} />
            {allDateKeys.map((key, di) => {
              const { label, dayName } = formatDate(key);
              const isMyDate = myDates.has(key);
              return (
                <div key={key} style={{ width:`${COL_W}px`, flexShrink:0, textAlign:"center", padding:"4px 2px 6px" }}>
                  <div style={{ fontSize:"10px", fontWeight:700, color: isMyDate ? "var(--accent)" : "var(--text-tertiary)" }}>{dayName}</div>
                  <div style={{ fontSize:"14px", fontWeight:800, color: isMyDate ? "var(--text-primary)" : "var(--text-tertiary)" }}>{label}</div>
                  {!isMyDate && <div style={{ fontSize:"8px", color:"var(--text-tertiary)", marginTop:"1px", lineHeight:1 }}>친구만</div>}
                </div>
              );
            })}
          </div>

          {/* 시간 행 × 날짜 열 그리드 */}
          {TIMES.map((time, ti) => (
            <div key={time} style={{ display:"flex", alignItems:"center" }}>
              <div style={{ width:`${TIME_W}px`, flexShrink:0, fontSize:"10px", color:"var(--text-tertiary)", fontWeight:600, textAlign:"right", paddingRight:"8px" }}>{time}</div>
              {allDateKeys.map((dateKey, di) => {
                const cellKey = `${dateKey}-${ti}`;
                const sel = isSelected(di, ti, cellKey);
                const isMyDate = myDates.has(dateKey);
                return (
                  <div key={cellKey} data-cell={cellKey} data-di={di} data-ti={ti}
                    onPointerDown={isMyDate ? (e) => handlePointerDown(e, di, ti, cellKey) : undefined}
                    style={{
                      width:`${COL_W - 3}px`,
                      height:"34px",
                      margin:"1px 1.5px",
                      flexShrink:0,
                      borderRadius:"5px",
                      background: sel ? "var(--accent)" : isMyDate ? "var(--bg-secondary)" : "transparent",
                      border: !isMyDate ? "1px dashed var(--border)" : "none",
                      cursor: isMyDate ? "pointer" : "default",
                      transition:"background 0.05s"
                    }}
                  />
                );
              })}
            </div>
          ))}

          {/* 범례 */}
          <div style={{ display:"flex", gap:"14px", padding:"12px 4px 20px", fontSize:"11px", color:"var(--text-tertiary)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"5px" }}><div style={{ width:"12px", height:"12px", borderRadius:"3px", background:"var(--accent)" }} />내 선택</div>
            <div style={{ display:"flex", alignItems:"center", gap:"5px" }}><div style={{ width:"12px", height:"12px", borderRadius:"3px", background:"var(--bg-secondary)" }} />내 날짜</div>
            <div style={{ display:"flex", alignItems:"center", gap:"5px" }}><div style={{ width:"12px", height:"12px", borderRadius:"3px", border:"1px dashed var(--border)" }} />친구만</div>
          </div>
        </div>
      </div>

      <div style={{ padding:"12px 20px 8px", flexShrink:0 }}>
        <button onClick={() => committed.size > 0 && onNavigate(SCREENS.TIME_RESULT)} style={{ width:"100%", padding:"16px", background: committed.size > 0 ? "var(--accent)" : "var(--bg-secondary)", color: committed.size > 0 ? "#fff" : "var(--text-tertiary)", border:"none", borderRadius:"14px", fontSize:"16px", fontWeight:700, cursor:"pointer" }}>
          {committed.size > 0 ? `${committed.size}개 시간 선택 완료 →` : "시간을 선택해주세요"}
        </button>
      </div>
    </div>
  );
}

                  <div style={{ display:"flex", alignItems:"center", fontSize:"24px", fontWeight:700, color:"var(--text-secondary)", zIndex:4 }}>:</div>

                  {/* 분 드럼롤 */}
                  <div style={{ flex:1, height:`${DRUM_H * 5}px`, overflowY:"scroll", scrollSnapType:"y mandatory", WebkitOverflowScrolling:"touch" }}
                    ref={minRef}
                    onScroll={() => {
                      clearTimeout(minTimerRef.current);
                      minTimerRef.current = setTimeout(() => {
                        if (minRef.current) {
                          const idx = Math.round(minRef.current.scrollTop / DRUM_H);
                          const c = Math.max(0, Math.min(idx, MINUTES_LIST.length-1));
                          minRef.current.scrollTop = c * DRUM_H;
                          setSm(MINUTES_LIST[c]);
                        }
                      }, 100);
                    }}
                  >
                    <div style={{ paddingTop:`${DRUM_H * 2}px`, paddingBottom:`${DRUM_H * 2}px` }}>
                      {MINUTES_LIST.map(m => (
                        <div key={m} style={{ scrollSnapAlign:"center", height:`${DRUM_H}px`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"22px", fontWeight: m === sm ? 800 : 400, color: m === sm ? "var(--text-primary)" : "var(--text-tertiary)" }}>
                          {String(m).padStart(2,"0")}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div style={{ padding:"10px 16px" }}>
                  <button onClick={() => setPickerOpen(false)} style={{ width:"100%", padding:"10px", background:"var(--accent)", color:"#fff", border:"none", borderRadius:"10px", fontSize:"14px", fontWeight:700, cursor:"pointer" }}>완료</button>
                </div>
              </div>
            )}
          </div>
        </div>

        {isEditing ? (
          <button onClick={() => {
            const h = sh, m = sm;
            const ampm = h >= 12 ? "오후" : "오전";
            const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
            const timeStr = `${ampm} ${h12}:${String(m).padStart(2,"0")}`;
            onConfirmTime ? onConfirmTime(DATE_OPTS[dateIdx], timeStr) : onNavigate(SCREENS.HOME);
          }} style={{ width:"100%", padding:"16px", background:"var(--bg-card)", border:"1.5px solid var(--text-primary)", borderRadius:"14px", fontSize:"16px", fontWeight:700, color:"var(--text-primary)", cursor:"pointer" }}>
            변경하기
          </button>
        ) : (
          <ConfirmButton
            label="이 시간으로 확정하기"
            warning="모든 참여자의 일정이 확정돼요"
            onConfirm={() => {
              const h = sh, m = sm;
              const ampm = h >= 12 ? "오후" : "오전";
              const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
              const timeStr = `${ampm} ${h12}:${String(m).padStart(2,"0")}`;
              onConfirmTime ? onConfirmTime(DATE_OPTS[dateIdx], timeStr) : onNavigate(SCREENS.PLACE_SELECT);
            }}
          />
        )}
      </div>
    </div>
  );
}

const SUB_FILTERS = { "식당":["전체","한식","중식","일식","양식"] };

function PlaceSelectScreen({ onNavigate, candidates, setCandidates, placeVotes, setPlaceVotes, onConfirmPlace, isEditing }) {
  const [query, setQuery] = useState("");
  const [mainCat, setMainCat] = useState("전체");
  const [subCat, setSubCat] = useState("전체");
  const [selectedPlace, setSelectedPlace] = useState(null);

  const isSearchMode = query.length > 0;

  const toggleCandidate = (id) => setCandidates(prev => {
    const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next;
  });
  const toggleVote = (id) => setPlaceVotes(prev => {
    const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next;
  });

  const MOCK_VOTES = { 1:2, 7:1, 10:3 };
  const totalVotes = (id) => (MOCK_VOTES[id] || 0) + (placeVotes.has(id) ? 1 : 0);

  const candidateList = PLACE_DB.filter(p => candidates.has(p.id))
    .sort((a, b) => totalVotes(b.id) - totalVotes(a.id));

  const searchResults = PLACE_DB.filter(p => {
    const q = query.toLowerCase();
    return (p.name.includes(q) || p.sub.includes(q) || p.tags.some(t => t.includes(q)))
      && (mainCat === "전체" || p.category === mainCat)
      && (!SUB_FILTERS[mainCat] || subCat === "전체" || p.sub === subCat);
  });

  return (
    <div className="fade-in" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="장소 정하기" subtitle="대학 동기 모임" onBack={() => onNavigate(isEditing ? SCREENS.DETAIL : SCREENS.TIME_RESULT)} />

      <div style={{ padding:"0 20px 10px", flexShrink:0 }}>
        {/* 중간지점 추천 */}
        {!isSearchMode && (
          <button onClick={() => onNavigate(SCREENS.PLACE_RECOMMEND)} style={{ width:"100%", padding:"12px 16px", background:"var(--bg-card)", border:"1.5px dashed var(--accent)", borderRadius:"14px", cursor:"pointer", display:"flex", alignItems:"center", gap:"12px", marginBottom:"10px", textAlign:"left" }}>
            <div style={{ width:"36px", height:"36px", borderRadius:"10px", background:"linear-gradient(135deg, rgba(255,107,74,0.15), rgba(124,92,252,0.15))", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px" }}>📍</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:"13px", fontWeight:700, color:"var(--accent)" }}>중간지점 추천받기</div>
              <div style={{ fontSize:"11px", color:"var(--text-secondary)", marginTop:"1px" }}>모두에게 공정한 만남 장소</div>
            </div>
            <span style={{ color:"var(--accent)" }}>→</span>
          </button>
        )}

        {/* 검색 바 */}
        <div style={{ display:"flex", alignItems:"center", gap:"8px", background:"var(--bg-secondary)", borderRadius:"12px", padding:"10px 14px" }}>
          <span style={{ fontSize:"15px", color:"var(--text-tertiary)" }}>🔍</span>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="장소 검색해서 후보 추가하기" style={{ flex:1, background:"none", border:"none", outline:"none", fontSize:"14px", color:"var(--text-primary)", fontFamily:"inherit" }} />
          {query && <button onClick={() => setQuery("")} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--text-tertiary)", fontSize:"15px", lineHeight:1 }}>✕</button>}
        </div>

        {/* 검색 모드 필터 */}
        {isSearchMode && (
          <div style={{ marginTop:"8px" }}>
            <div style={{ display:"flex", gap:"6px", marginBottom: SUB_FILTERS[mainCat] ? "6px" : "0" }}>
              {["전체","식당","카페","술집"].map(cat => (
                <button key={cat} onClick={() => { setMainCat(cat); setSubCat("전체"); }} style={{ flexShrink:0, padding:"6px 12px", borderRadius:"20px", border:"none", background: mainCat===cat ? "var(--accent)" : "var(--bg-secondary)", color: mainCat===cat ? "#fff" : "var(--text-secondary)", fontSize:"12px", fontWeight:600, cursor:"pointer" }}>{cat}</button>
              ))}
            </div>
            {SUB_FILTERS[mainCat] && (
              <div style={{ display:"flex", gap:"6px", overflowX:"auto" }}>
                {SUB_FILTERS[mainCat].map(s => (
                  <button key={s} onClick={() => setSubCat(s)} style={{ flexShrink:0, padding:"4px 10px", borderRadius:"14px", border: subCat===s ? "none" : "1px solid var(--border)", background: subCat===s ? "var(--text-primary)" : "var(--bg-card)", color: subCat===s ? "#fff" : "var(--text-secondary)", fontSize:"11px", fontWeight:600, cursor:"pointer" }}>{s}</button>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"0 20px" }}>
        {isSearchMode ? (
          /* ── 검색 결과 뷰 ── */
          <div style={{ paddingBottom:"20px" }}>
            <p style={{ fontSize:"12px", fontWeight:700, color:"var(--text-secondary)", margin:"0 0 10px" }}>{searchResults.length}곳</p>
            {searchResults.length === 0
              ? <div style={{ textAlign:"center", padding:"40px 0", color:"var(--text-tertiary)" }}>검색 결과가 없어요</div>
              : searchResults.map(p => {
                const isC = candidates.has(p.id);
                return (
                  <div key={p.id} style={{ background:"var(--bg-card)", borderRadius:"14px", border: isC ? "1.5px solid var(--accent)" : "1px solid var(--border)", padding:"14px", marginBottom:"10px" }}>
                    <div style={{ display:"flex", gap:"12px", alignItems:"center" }}>
                      <div style={{ width:"44px", height:"44px", borderRadius:"10px", background:"var(--bg-secondary)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"22px", flexShrink:0 }}>{p.emoji}</div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:"flex", justifyContent:"space-between" }}>
                          <h4 style={{ fontSize:"14px", fontWeight:700, color:"var(--text-primary)", margin:0 }}>{p.name}</h4>
                          <span style={{ color:"#FFB800", fontSize:"12px", fontWeight:700 }}>★ {p.rating}</span>
                        </div>
                        <p style={{ fontSize:"11px", color:"var(--text-secondary)", margin:"2px 0 5px" }}>{p.sub} · {p.price} · {p.dist}</p>
                        <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                          {p.tags.map(t => <span key={t} style={{ padding:"2px 6px", borderRadius:"5px", background:"var(--bg-secondary)", fontSize:"10px", color:"var(--text-tertiary)", fontWeight:600 }}>{t}</span>)}
                        </div>
                      </div>
                    </div>
                    <button onClick={() => toggleCandidate(p.id)} style={{ width:"100%", marginTop:"10px", padding:"8px", borderRadius:"8px", border:"none", background: isC ? "var(--accent)" : "var(--bg-secondary)", color: isC ? "#fff" : "var(--text-secondary)", fontSize:"13px", fontWeight:700, cursor:"pointer" }}>
                      {isC ? "후보 등록됨 ✓  ·  제거하기" : "후보로 등록하기"}
                    </button>
                  </div>
                );
              })
            }
          </div>
        ) : (
          /* ── 후보 목록 메인 뷰 ── */
          <div style={{ paddingBottom:"80px" }}>
            <p style={{ fontSize:"12px", fontWeight:700, color:"var(--text-secondary)", margin:"0 0 10px" }}>후보 장소 ({candidateList.length})</p>
            {candidateList.length === 0
              ? <div style={{ textAlign:"center", padding:"48px 0" }}>
                  <div style={{ fontSize:"36px", marginBottom:"12px" }}>📍</div>
                  <p style={{ fontSize:"14px", color:"var(--text-secondary)", fontWeight:600 }}>아직 후보 장소가 없어요</p>
                  <p style={{ fontSize:"13px", color:"var(--text-tertiary)", marginTop:"4px" }}>위 검색창에서 장소를 찾아 추가해보세요</p>
                </div>
              : candidateList.map((p, idx) => {
                const vCount = totalVotes(p.id);
                const isVoted = placeVotes.has(p.id);
                const isTop = idx === 0 && vCount > 0;
                const isPicked = selectedPlace === p.id;
                return (
                  <div key={p.id} style={{ background:"var(--bg-card)", borderRadius:"14px", border: isPicked ? "2px solid #7C5CFC" : isTop ? "2px solid var(--accent)" : "1px solid var(--border)", padding:"14px", marginBottom:"10px", position:"relative", transition:"border 0.15s" }}>
                    {isTop && !isPicked && <div style={{ position:"absolute", top:"-1px", left:"14px", background:"var(--accent)", color:"#fff", fontSize:"10px", fontWeight:700, padding:"2px 8px", borderRadius:"0 0 8px 8px" }}>👑 1위</div>}
                    {isPicked && <div style={{ position:"absolute", top:"-1px", left:"14px", background:"#7C5CFC", color:"#fff", fontSize:"10px", fontWeight:700, padding:"2px 8px", borderRadius:"0 0 8px 8px" }}>✓ 선택됨</div>}
                    <div style={{ display:"flex", gap:"12px", marginTop: (isTop || isPicked) ? "8px" : "0" }}>
                      <div style={{ width:"48px", height:"48px", borderRadius:"12px", background:"var(--bg-secondary)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"24px", flexShrink:0 }}>{p.emoji}</div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                          <div>
                            <h4 style={{ fontSize:"15px", fontWeight:700, color:"var(--text-primary)", margin:0 }}>{p.name}</h4>
                            <p style={{ fontSize:"12px", color:"var(--text-secondary)", margin:"3px 0 0" }}>{p.sub} · {p.price} · {p.dist}</p>
                          </div>
                          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"4px" }}>
                            <span style={{ color:"#FFB800", fontSize:"12px", fontWeight:700 }}>★ {p.rating}</span>
                            <button onClick={() => toggleCandidate(p.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--text-tertiary)", fontSize:"11px", padding:0, fontWeight:600 }}>제거</button>
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:"5px", marginTop:"6px", flexWrap:"wrap" }}>
                          {p.tags.map(t => <span key={t} style={{ padding:"2px 7px", borderRadius:"5px", background:"var(--bg-secondary)", fontSize:"10px", color:"var(--text-tertiary)", fontWeight:600 }}>{t}</span>)}
                        </div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:"8px", marginTop:"10px" }}>
                      <button onClick={() => toggleVote(p.id)} style={{ flex:1, padding:"9px", borderRadius:"9px", border:"none", background: isVoted ? "var(--accent)" : "var(--bg-secondary)", color: isVoted ? "#fff" : "var(--text-secondary)", fontSize:"12px", fontWeight:700, cursor:"pointer", transition:"all 0.2s" }}>
                        {isVoted ? `✓ 투표함 (${vCount}명)` : `투표하기 (${vCount}명)`}
                      </button>
                      <button onClick={() => setSelectedPlace(isPicked ? null : p.id)} style={{ flex:1, padding:"9px", borderRadius:"9px", border: isPicked ? "none" : "1.5px solid #7C5CFC", background: isPicked ? "#7C5CFC" : "transparent", color: isPicked ? "#fff" : "#7C5CFC", fontSize:"12px", fontWeight:700, cursor:"pointer", transition:"all 0.15s" }}>
                        {isPicked ? "선택 해제" : "이 곳으로 확정"}
                      </button>
                    </div>
                  </div>
                );
              })
            }
          </div>
        )}
      </div>

      {!isSearchMode && (
        <div style={{ padding:"12px 20px 12px", flexShrink:0, display:"flex", flexDirection:"column", gap:"8px" }}>
          {candidateList.length > 0 && (
            selectedPlace
              ? (isEditing
                  ? <button onClick={() => { onConfirmPlace(PLACE_DB.find(p=>p.id===selectedPlace)?.name ?? null); onNavigate(SCREENS.HOME); }} style={{ width:"100%", padding:"16px", background:"var(--bg-card)", border:"1.5px solid var(--text-primary)", borderRadius:"14px", fontSize:"16px", fontWeight:700, color:"var(--text-primary)", cursor:"pointer" }}>
                      변경하기
                    </button>
                  : <ConfirmButton
                      label={`${PLACE_DB.find(p => p.id === selectedPlace)?.name ?? "선택한 장소"}로 확정하기`}
                      warning="모든 참여자의 장소가 확정돼요"
                      onConfirm={() => { onConfirmPlace(PLACE_DB.find(p => p.id === selectedPlace)?.name ?? null); onNavigate(SCREENS.HOME); }}
                    />
                )
              : <div style={{ padding:"13px 16px", background:"var(--bg-secondary)", borderRadius:"14px", textAlign:"center", fontSize:"13px", color:"var(--text-tertiary)", fontWeight:600 }}>
                  {isEditing ? "변경할 장소를 선택해주세요" : "후보 중 확정할 장소를 선택해주세요"}
                </div>
          )}
          <button onClick={() => { onConfirmPlace(null); onNavigate(SCREENS.HOME); }} style={{ width:"100%", padding:"12px", background:"transparent", color:"var(--text-tertiary)", border:"1px dashed var(--border)", borderRadius:"14px", fontSize:"13px", fontWeight:600, cursor:"pointer" }}>
            일단 장소 없이 확정할게요
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState(SCREENS.HOME);
  const [selectedDates, setSelectedDates] = useState(new Set());
  const [meetings, setMeetings] = useState([]);
  const [candidates, setCandidates] = useState(new Set());
  const [placeVotes, setPlaceVotes] = useState(new Set());
  const [currentMeetingId, setCurrentMeetingId] = useState(null);
  const [restVoted, setRestVoted] = useState(false);
  const [chatOpen, setChatOpen] = useState(false);
  const [chatMessages, setChatMessages] = useState([...MOCK_CHAT]);
  const [chatInput, setChatInput] = useState("");
  const [chatUnread, setChatUnread] = useState(2);
  const contentRef = useRef(null);
  const navigate = (newScreen) => {
    setScreen(newScreen);
    setChatOpen(false);
    if (!CHAT_SCREENS.includes(newScreen)) setChatUnread(0);
    if (contentRef.current) contentRef.current.scrollTop = 0;
  };
  const sendChat = (text) => {
    if (!text.trim()) return;
    const now = new Date();
    const hh = now.getHours();
    const mm = String(now.getMinutes()).padStart(2,"0");
    const ampm = hh >= 12 ? "오후" : "오전";
    const h12 = hh > 12 ? hh - 12 : hh === 0 ? 12 : hh;
    setChatMessages(prev => [...prev, { id: Date.now(), sender:"나", text: text.trim(), time:`${ampm} ${h12}:${mm}`, mine:true }]);
    setChatInput("");
  };
  const openChat = () => { setChatOpen(true); setChatUnread(0); };

  useEffect(() => {
    const db = window.db;
    if (!db) return;
    const unsub = db.collection("meetings").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
      const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      setMeetings(data);
    });
    return () => unsub();
  }, []);

  const COLORS = ["#7C5CFC", "#00C9A7", "#FF6B4A", "#FFB800", "#FF3CAC"];
  const addMeeting = async (title) => {
    const db = window.db;
    if (!db) return;
    const newMeeting = {
      title,
      date: "날짜 조율 중",
      time: "미정",
      place: null,
      members: ["민지"],
      status: "voting",
      step: "time",
      color: COLORS[meetings.length % COLORS.length],
      createdAt: Date.now()
    };
    const docRef = await db.collection("meetings").add(newMeeting);
    setCurrentMeetingId(docRef.id);
  };
  const removeMeeting = async (id) => {
    const db = window.db;
    if (db) await db.collection("meetings").doc(id).delete();
  };

  const confirmTime = async (date, time) => {
    const db = window.db;
    const isEditing = meetings.find(m => m.id === currentMeetingId)?.step === "done";
    if (db && currentMeetingId) {
      await db.collection("meetings").doc(currentMeetingId).update({ step: isEditing ? "done" : "place", date, time });
    }
    navigate(isEditing ? SCREENS.HOME : SCREENS.PLACE_SELECT);
  };
  const confirmPlace = async (placeName) => {
    const db = window.db;
    const current = meetings.find(m => m.id === currentMeetingId);
    if (db && currentMeetingId) {
      await db.collection("meetings").doc(currentMeetingId).update({ step: "done", status: "confirmed", place: placeName !== null ? placeName : (current?.place || null) });
    }
    navigate(SCREENS.HOME);
  };

  const renderScreen = () => {
    switch (screen) {
      case SCREENS.HOME:            return <HomeScreen onNavigate={navigate} meetings={meetings} onRemove={removeMeeting} onSelectMeeting={setCurrentMeetingId} />;
      case SCREENS.CREATE:          return <CreateScreen onNavigate={navigate} onCreateMeeting={addMeeting} />;
      case SCREENS.INVITE:          return <InviteScreen onNavigate={navigate} />;
      case SCREENS.LINK_JOIN:       return <LinkJoinScreen onNavigate={navigate} />;
      case SCREENS.DATE_SELECT:     return <DateSelectScreen onNavigate={navigate} selectedDates={selectedDates} setSelectedDates={setSelectedDates} />;
      case SCREENS.TIME_SELECT:     return <TimeSelectScreen onNavigate={navigate} selectedDates={selectedDates} />;
      case SCREENS.TIME_RESULT:     return <TimeResultScreen onNavigate={navigate} onConfirmTime={confirmTime} isEditing={meetings.find(m=>m.id===currentMeetingId)?.step==="done"} />;
      case SCREENS.PLACE_SELECT:    return <PlaceSelectScreen onNavigate={navigate} candidates={candidates} setCandidates={setCandidates} placeVotes={placeVotes} setPlaceVotes={setPlaceVotes} onConfirmPlace={confirmPlace} isEditing={meetings.find(m=>m.id===currentMeetingId)?.step==="done"} />;
      case SCREENS.PLACE_RECOMMEND: return <PlaceRecommendScreen onNavigate={navigate} />;
      case SCREENS.DETAIL:          return <DetailScreen onNavigate={navigate} meeting={meetings.find(m=>m.id===currentMeetingId)} restVoted={restVoted} setRestVoted={setRestVoted} />;
      case SCREENS.REST_VOTE:       return <RestVoteScreen onNavigate={navigate} setRestVoted={setRestVoted} />;
      default:                      return <HomeScreen onNavigate={navigate} />;
    }
  };

  return (
    <div style={{ width:"375px", height:"812px", borderRadius:"40px", overflow:"hidden", background:"var(--bg-primary)", boxShadow:"0 25px 80px rgba(0,0,0,0.4), 0 0 0 8px #2a2a3e", display:"flex", flexDirection:"column", position:"relative" }}>
      <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:"150px", height:"28px", background:"#000", borderRadius:"0 0 20px 20px", zIndex:10 }} />
      <StatusBar />
      <div ref={contentRef} style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {renderScreen()}
        {screen !== SCREENS.HOME && (
          <button
            onClick={() => navigate(SCREENS.HOME)}
            style={{
              position:"absolute", top:"10px", right:"16px", zIndex:50,
              background:"var(--bg-card)", border:"1px solid var(--border)",
              borderRadius:"20px", padding:"6px 12px",
              cursor:"pointer", display:"flex", alignItems:"center", gap:"5px",
              boxShadow:"0 2px 8px rgba(0,0,0,0.08)", color:"var(--text-secondary)",
              fontSize:"12px", fontWeight:700
            }}
          >
            <span style={{ fontSize:"14px" }}>⌂</span> 홈
          </button>
        )}
        {CHAT_SCREENS.includes(screen) && (
          <ChatPanel
            open={chatOpen}
            onToggle={() => chatOpen ? setChatOpen(false) : openChat()}
            messages={chatMessages}
            input={chatInput}
            setInput={setChatInput}
            onSend={sendChat}
            unread={chatUnread}
          />
        )}
      </div>
      <div style={{ position:"absolute", bottom:"6px", left:"50%", transform:"translateX(-50%)", width:"134px", height:"5px", borderRadius:"3px", background:"rgba(0,0,0,0.15)" }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
